<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTBK PK 2026 - Interactive Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; }
        .fade-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="text-slate-800">

    <div id="screen-welcome" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-8">
            <div class="inline-flex p-4 bg-indigo-50 rounded-2xl text-indigo-600 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Simulasi UTBK 2026</h1>
            <p class="text-slate-500">Silakan masukkan nama lengkap Anda untuk memulai sesi Pengetahuan Kuantitatif (10 Menit).</p>
            <div class="space-y-4">
                <input type="text" id="user-name" placeholder="Nama Lengkap Anda" class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all outline-none text-center text-lg">
                <button onclick="startQuiz()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200 uppercase tracking-wider">Mulai Ujian</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="sticky top-0 z-50 glass border-b p-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 text-white p-2 rounded-lg font-bold">UTBK</div>
                    <span id="display-name" class="font-semibold text-slate-600">Peserta</span>
                </div>
                <div id="timer" class="px-4 py-2 bg-red-50 text-red-600 font-mono font-bold rounded-xl border border-red-100 text-xl">10:00</div>
            </div>
            <div class="max-w-6xl mx-auto bg-slate-100 h-2.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </header>

        <main class="flex-grow max-w-6xl mx-auto w-full p-4 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-6">
                <div id="q-card" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 min-h-[450px] flex flex-col justify-between fade-enter">
                    <div>
                        <div class="flex items-center gap-2 mb-4">
                            <span id="q-num" class="bg-slate-900 text-white text-xs font-bold px-3 py-1 rounded-full">SOAL 1</span>
                            <span id="q-cat" class="text-xs font-bold text-indigo-500 uppercase tracking-widest">Aljabar</span>
                        </div>
                        <h2 id="q-text" class="text-xl md:text-2xl font-bold leading-snug text-slate-800 mb-8">Memuat pertanyaan...</h2>
                        <div id="options" class="space-y-3"></div>
                    </div>

                    <div class="flex justify-between items-center pt-8 border-t mt-8">
                        <button onclick="prevQ()" id="btn-prev" class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition-all disabled:opacity-30">
                            ← Kembali
                        </button>
                        <button onclick="nextQ()" id="btn-next" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">
                            Lanjut →
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl border border-slate-200 p-6 sticky top-36">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-6">Navigasi Soal</h3>
                    <div id="q-grid" class="grid grid-cols-5 gap-3"></div>
                    <button onclick="confirmFinish()" class="w-full mt-10 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg">Kumpulkan Jawaban</button>
                </div>
            </div>
        </main>
    </div>

    <div id="screen-result" class="hidden fixed inset-0 z-[200] bg-slate-50 flex items-center justify-center p-6 overflow-y-auto">
        <div class="max-w-2xl w-full bg-white rounded-[40px] shadow-2xl p-10 text-center border border-slate-100">
            <div id="result-icon" class="mb-6"></div>
            <h2 class="text-4xl font-extrabold text-slate-900 mb-2">Selesai!</h2>
            <p id="result-name" class="text-indigo-600 font-bold text-xl mb-6">Aulia Rochman</p>
            
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="p-4 bg-slate-50 rounded-3xl">
                    <div id="final-score" class="text-3xl font-black text-indigo-600">0</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Skor Akhir</div>
                </div>
                <div class="p-4 bg-green-50 rounded-3xl">
                    <div id="final-correct" class="text-3xl font-black text-green-600">0</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Benar</div>
                </div>
                <div class="p-4 bg-red-50 rounded-3xl">
                    <div id="final-wrong" class="text-3xl font-black text-red-600">0</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Salah</div>
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="sendEmail()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" /><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" /></svg>
                    Kirim Hasil ke Email
                </button>
                <button onclick="location.reload()" class="w-full py-4 border-2 border-slate-100 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all">Ulangi Simulasi</button>
            </div>
        </div>
    </div>

<script>
    const questions = [
        { cat: "Aljabar", q: "Jika x² - 5x + 6 = 0, maka nilai dari x₁ + x₂ adalah...", a: ["2", "3", "5", "6", "-5"], r: 2 },
        { cat: "Aljabar", q: "Manakah nilai yang memenuhi 3^(x-1) = 81?", a: ["3", "4", "5", "6", "7"], r: 2 },
        { cat: "Geometri", q: "Sebuah kubus memiliki volume 64 cm³. Luas permukaan kubus tersebut adalah...", a: ["16 cm²", "64 cm²", "96 cm²", "128 cm²", "144 cm²"], r: 2 },
        { cat: "Statistika", q: "Median dari data: 4, 7, 5, 8, 9, 6, 7 adalah...", a: ["6", "6.5", "7", "7.5", "8"], r: 2 },
        { cat: "Peluang", q: "Dua buah dadu dilempar bersamaan. Peluang muncul jumlah mata dadu 10 adalah...", a: ["1/12", "1/36", "3/36", "4/36", "5/36"], r: 2 },
        { cat: "Aljabar", q: "Jika a + b = 12 dan a - b = 4, maka nilai a² - b² adalah...", a: ["16", "32", "48", "64", "144"], r: 2 },
        { cat: "Geometri", q: "Besar sudut penyiku dari 35° adalah...", a: ["35°", "45°", "55°", "145°", "65°"], r: 2 },
        { cat: "Statistika", q: "Rata-rata dari 10, 15, 20, 25, 30 adalah...", a: ["15", "20", "22", "25", "30"], r: 1 },
        { cat: "Peluang", q: "Banyak cara menyusun huruf dari kata 'MATA' adalah...", a: ["24", "12", "6", "4", "8"], r: 1 },
        { cat: "Aljabar", q: "Jika f(x) = 2x + 7, maka f(-3) adalah...", a: ["13", "1", "-1", "-13", "0"], r: 1 },
        { cat: "Geometri", q: "Panjang diagonal sisi persegi yang memiliki luas 25 cm² adalah...", a: ["5 cm", "5√2 cm", "5√3 cm", "10 cm", "25√2 cm"], r: 1 },
        { cat: "Aljabar", q: "Bentuk sederhana dari (2² × 2³) : 2⁴ adalah...", a: ["2", "4", "8", "16", "1"], r: 0 },
        { cat: "Statistika", q: "Modus dari data: 2, 3, 3, 4, 5, 5, 5, 6 adalah...", a: ["3", "4", "5", "6", "2"], r: 2 },
        { cat: "Peluang", q: "Peluang munculnya 2 Gambar pada pelemparan 2 koin adalah...", a: ["1/2", "1/4", "3/4", "1", "0"], r: 1 },
        { cat: "Aljabar", q: "Nilai x yang memenuhi 2x - 5 < 7 adalah...", a: ["x < 1", "x < 6", "x < 12", "x > 6", "x > 1"], r: 1 },
        { cat: "Geometri", q: "Luas lingkaran dengan jari-jari 7 cm adalah...", a: ["44 cm²", "88 cm²", "154 cm²", "308 cm²", "616 cm²"], r: 2 },
        { cat: "Aljabar", q: "Jika x = 2 dan y = -3, maka nilai 3x - 2y adalah...", a: ["0", "6", "12", "-6", "9"], r: 2 },
        { cat: "Peluang", q: "Satu dadu dilempar. Peluang muncul mata dadu ganjil adalah...", a: ["1/6", "1/3", "1/2", "2/3", "1"], r: 2 },
        { cat: "Geometri", q: "Tinggi sebuah segitiga jika luas 24 cm² dan alas 6 cm adalah...", a: ["4 cm", "8 cm", "12 cm", "6 cm", "10 cm"], r: 1 },
        { cat: "Statistika", q: "Jangkauan dari data 10, 2, 5, 20, 15 adalah...", a: ["10", "15", "18", "20", "5"], r: 2 }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let timeLeft = 600; 
    let userName = "";
    let quizInterval;

    function startQuiz() {
        userName = document.getElementById('user-name').value;
        if (!userName) { alert("Masukkan nama dulu ya!"); return; }
        
        document.getElementById('display-name').innerText = userName;
        document.getElementById('screen-welcome').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        
        renderQuestion();
        renderGrid();
        quizInterval = setInterval(updateTimer, 1000);
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        const card = document.getElementById('q-card');
        
        card.classList.remove('fade-enter');
        void card.offsetWidth; // Trigger reflow
        card.classList.add('fade-enter');

        document.getElementById('q-num').innerText = `SOAL ${currentIdx + 1}`;
        document.getElementById('q-cat').innerText = q.cat;
        document.getElementById('q-text').innerText = q.q;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const isSelected = userAnswers[currentIdx] === i;
            optionsDiv.innerHTML += `
                <button onclick="selectOption(${i})" class="group w-full text-left p-4 rounded-2xl border-2 transition-all flex items-center gap-4 ${isSelected ? 'border-indigo-600 bg-indigo-50 shadow-sm' : 'border-slate-100 hover:border-slate-200 hover:bg-slate-50'}">
                    <span class="w-10 h-10 rounded-xl flex items-center justify-center font-bold transition-all ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400 group-hover:bg-slate-200'}">${String.fromCharCode(65 + i)}</span>
                    <span class="font-semibold ${isSelected ? 'text-indigo-900' : 'text-slate-600'}">${opt}</span>
                </button>
            `;
        });

        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-next').innerText = currentIdx === questions.length - 1 ? "Selesai Ujian" : "Lanjut →";
        document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
        renderGrid();
    }

    function selectOption(idx) {
        userAnswers[currentIdx] = idx;
        renderQuestion();
    }

    function nextQ() {
        if (currentIdx < questions.length - 1) {
            currentIdx++; renderQuestion();
        } else { confirmFinish(); }
    }

    function prevQ() { if (currentIdx > 0) { currentIdx--; renderQuestion(); } }

    function goToQ(i) { currentIdx = i; renderQuestion(); }

    function renderGrid() {
        const grid = document.getElementById('q-grid');
        grid.innerHTML = "";
        questions.forEach((_, i) => {
            const isAnswered = userAnswers[i] !== null;
            const isCurrent = i === currentIdx;
            grid.innerHTML += `
                <button onclick="goToQ(${i})" class="h-10 rounded-xl font-bold text-xs transition-all ${isCurrent ? 'ring-2 ring-indigo-600 ring-offset-2' : ''} ${isAnswered ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}">${i + 1}</button>
            `;
        });
    }

    function updateTimer() {
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft <= 0) { clearInterval(quizInterval); finishQuiz(); }
    }

    function confirmFinish() {
        if (confirm("Kumpulkan jawaban sekarang?")) { clearInterval(quizInterval); finishQuiz(); }
    }

    function finishQuiz() {
        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === questions[i].r) correct++; });
        
        const score = correct * 5;
        document.getElementById('main-app').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        document.getElementById('result-name').innerText = userName;
        document.getElementById('final-score').innerText = score;
        document.getElementById('final-correct').innerText = correct;
        document.getElementById('final-wrong').innerText = 20 - correct;
        
        const iconDiv = document.getElementById('result-icon');
        iconDiv.innerHTML = score >= 70 ? '🎉' : '📚';
        iconDiv.className = "text-6xl mb-4";
    }

    function sendEmail() {
        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === questions[i].r) correct++; });
        
        const subject = encodeURIComponent(`Hasil Simulasi UTBK - ${userName}`);
        const body = encodeURIComponent(
            `Halo Aulia,\n\nBerikut hasil simulasi UTBK Pengetahuan Kuantitatif:\n\n` +
            `Nama: ${userName}\n` +
            `Skor Akhir: ${correct * 5}\n` +
            `Benar: ${correct}\n` +
            `Salah: ${20 - correct}\n\n` +
            `Terima kasih telah berlatih!`
        );
        
        window.location.href = `mailto:auliarochmans@gmail.com?subject=${subject}&body=${body}`;
    }
</script>
</body>
</html>
