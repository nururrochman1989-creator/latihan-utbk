<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTBK Premium Simulator - Penalaran Matematika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FDFDFD; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .custom-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-800">

    <div id="screen-welcome" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-8 fade-in">
            <div class="inline-flex p-5 bg-blue-50 rounded-[2rem] text-blue-600 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Simulasi UTBK</h1>
                <p class="text-slate-500 mt-3 text-lg font-medium">Subtes: Penalaran Matematika</p>
                <div class="flex justify-center gap-4 mt-4 text-sm font-bold text-slate-400">
                    <span>20 SOAL</span>
                    <span>•</span>
                    <span>10 MENIT</span>
                </div>
            </div>
            <div class="space-y-4">
                <input type="text" id="user-name" placeholder="Masukkan Nama Lengkap" class="w-full px-7 py-5 rounded-2xl border-2 border-slate-100 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition-all outline-none text-center text-lg font-semibold">
                <button onclick="startQuiz()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 text-lg">Mulai Ujian</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-100 p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm uppercase italic">Live</div>
                    <span id="header-name" class="font-bold text-slate-500 text-sm">Peserta</span>
                </div>
                <div id="timer" class="px-6 py-2.5 bg-red-50 text-red-600 font-mono font-black rounded-2xl border border-red-100 text-2xl tracking-tighter">10:00</div>
            </div>
            <div class="max-w-7xl mx-auto bg-slate-100 h-2.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
        </header>

        <main class="flex-grow max-w-7xl mx-auto w-full p-4 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8">
                <div id="q-card" class="bg-white rounded-[2.5rem] border border-slate-100 p-8 md:p-12 min-h-[500px] flex flex-col justify-between custom-shadow fade-in">
                    <div>
                        <div class="flex items-center gap-3 mb-8">
                            <span id="q-num-label" class="bg-slate-900 text-white text-[11px] font-black px-4 py-1.5 rounded-full tracking-widest uppercase">Soal 01</span>
                            <span class="h-1.5 w-1.5 rounded-full bg-slate-300"></span>
                            <span id="q-cat" class="text-xs font-bold text-blue-500 uppercase tracking-widest">Penalaran Matematika</span>
                        </div>
                        <h2 id="q-text" class="text-xl md:text-2xl font-bold leading-relaxed text-slate-800 mb-10">Memuat teks soal...</h2>
                        <div id="options" class="grid grid-cols-1 gap-4"></div>
                    </div>

                    <div class="flex justify-between items-center pt-10 border-t border-slate-50 mt-12">
                        <button onclick="prevQ()" id="btn-prev" class="group flex items-center gap-2 px-8 py-4 rounded-2xl font-bold text-slate-400 hover:text-slate-800 hover:bg-slate-50 transition-all">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                            Kembali
                        </button>
                        <button onclick="nextQ()" id="btn-next" class="group flex items-center gap-2 px-10 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-100 transition-all">
                            Lanjut
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="bg-white rounded-[2rem] border border-slate-100 p-8 sticky top-36 custom-shadow">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8 text-center">Navigasi Nomor</h3>
                    <div id="q-grid" class="grid grid-cols-5 gap-3"></div>
                    <button onclick="confirmFinish()" class="w-full mt-10 py-5 bg-slate-900 text-white rounded-2xl font-extrabold hover:bg-slate-800 transition-all shadow-xl shadow-slate-200">Selesai Ujian</button>
                </div>
            </div>
        </main>
    </div>

    <div id="screen-result" class="hidden fixed inset-0 z-[200] bg-slate-50 flex items-center justify-center p-6 overflow-y-auto">
        <div class="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl p-10 md:p-16 text-center border border-white fade-in">
            <div class="mb-8 inline-flex p-6 bg-green-50 text-green-500 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h2 class="text-4xl font-extrabold text-slate-900 mb-3 tracking-tight">Skor Kamu</h2>
            <p id="res-user-name" class="text-blue-600 font-bold text-xl mb-10 uppercase tracking-widest">NAMA PESERTA</p>
            
            <div class="grid grid-cols-2 gap-6 mb-12">
                <div class="p-8 bg-blue-50/50 rounded-[2rem] border border-blue-100">
                    <div id="res-score" class="text-6xl font-black text-blue-600 tracking-tighter">0</div>
                    <div class="text-[10px] font-black text-blue-400 uppercase mt-2 tracking-widest">Skor Akhir</div>
                </div>
                <div class="p-8 bg-slate-50 rounded-[2rem] border border-slate-100 text-center">
                    <div id="res-correct" class="text-4xl font-black text-slate-800">0</div>
                    <div class="text-[10px] font-black text-slate-400 uppercase mt-4 tracking-widest">Benar / 20</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="toggleReview()" class="py-5 bg-slate-100 text-slate-700 rounded-2xl font-bold hover:bg-slate-200 transition-all">Review Jawaban</button>
                <button onclick="downloadPDF()" class="py-5 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-xl shadow-blue-200">Simpan Analisis PDF</button>
            </div>
        </div>
    </div>

    <div id="review-overlay" class="hidden fixed inset-0 z-[300] bg-white overflow-y-auto p-6 md:p-12 lg:p-20">
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6">
                <div>
                    <h2 class="text-4xl font-black tracking-tight mb-2">Analisis Jawaban</h2>
                    <p class="text-slate-400 font-medium">Periksa kembali setiap soal untuk evaluasi belajar.</p>
                </div>
                <button onclick="toggleReview()" class="px-6 py-3 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-100 transition-all tracking-wide">Tutup Review ✕</button>
            </div>
            <div id="review-content" class="space-y-10 pb-20"></div>
        </div>
    </div>

<script>
    // Soal Penalaran Matematika Standar UTBK
    const questions = [
        { q: "Seorang pedagang membeli 50 kg jeruk seharga Rp600.000. Jika ia ingin mendapatkan keuntungan 25%, berapa harga jual per kg jeruk tersebut?", a: ["Rp12.000", "Rp14.500", "Rp15.000", "Rp16.000", "Rp18.000"], r: 2 },
        { q: "Dua buah tabung memiliki perbandingan jari-jari 2:3 dan tinggi 3:2. Perbandingan volume kedua tabung tersebut adalah...", a: ["2 : 3", "3 : 2", "4 : 9", "9 : 4", "1 : 1"], r: 0 },
        { q: "Rata-rata tinggi badan 10 siswa adalah 165 cm. Jika digabung dengan 5 siswa lain, rata-ratanya menjadi 168 cm. Rata-rata tinggi 5 siswa baru tersebut adalah...", a: "172 cm", a: ["170 cm", "172 cm", "174 cm", "175 cm", "176 cm"], r: 2 },
        { q: "Dalam sebuah kotak terdapat 4 bola merah dan 6 bola biru. Jika diambil 2 bola sekaligus secara acak, peluang terambil keduanya bola biru adalah...", a: ["1/3", "2/3", "1/15", "6/15", "3/15"], r: 0 },
        { q: "Suku ke-5 dari barisan aritmetika adalah 18 dan suku ke-9 adalah 30. Suku pertama barisan tersebut adalah...", a: ["4", "6", "8", "10", "12"], r: 1 },
        { q: "Suatu pekerjaan dapat selesai dalam 20 hari oleh 12 orang. Jika pekerjaan ingin selesai dalam 15 hari, berapa tambahan pekerja yang dibutuhkan?", a: ["2 orang", "4 orang", "6 orang", "8 orang", "10 orang"], r: 1 },
        { q: "Nilai x yang memenuhi persamaan 2^(x+3) = 1/16 adalah...", a: ["-7", "-5", "-3", "3", "7"], r: 0 },
        { q: "Jika f(x) = 3x - 5 dan g(x) = x^2 + 1, maka nilai dari (g o f)(2) adalah...", a: ["1", "2", "3", "4", "5"], r: 1 },
        { q: "Persamaan garis yang melalui titik (2,3) dan sejajar dengan garis y = 2x + 5 adalah...", a: ["y = 2x - 1", "y = 2x + 1", "y = 2x - 7", "y = 2x + 7", "y = -2x + 7"], r: 0 },
        { q: "Sebuah peta memiliki skala 1 : 250.000. Jika jarak dua kota pada peta 8 cm, jarak sebenarnya adalah...", a: ["10 km", "20 km", "40 km", "50 km", "100 km"], r: 1 },
        { q: "Himpunan penyelesaian dari |2x - 1| < 5 adalah...", a: ["x < 3", "x > -2", "-2 < x < 3", "x < -2 atau x > 3", "-3 < x < 2"], r: 2 },
        { q: "Jika x dan y adalah solusi dari 2x+y=10 dan x-y=2, maka nilai x*y adalah...", a: ["4", "6", "8", "12", "16"], r: 2 },
        { q: "Luas sebuah persegi panjang adalah 120 cm². Jika panjangnya 2 cm lebih dari lebarnya, maka kelilingnya adalah...", a: ["40 cm", "44 cm", "46 cm", "48 cm", "52 cm"], r: 1 },
        { q: "Diberikan data: 6, 7, 8, 5, 10, 9. Simpangan rata-rata data tersebut adalah...", a: ["1.5", "1.6", "1.7", "1.8", "2.0"], r: 0 },
        { q: "Sebuah bola basket dijatuhkan dari ketinggian 10m dan memantul kembali 3/4 kali tinggi sebelumnya. Panjang seluruh lintasan bola hingga berhenti adalah...", a: ["40m", "60m", "70m", "80m", "100m"], r: 2 },
        { q: "Harga 3 buku dan 2 pensil adalah Rp17.000. Harga 2 buku dan 5 pensil adalah Rp15.000. Harga 1 buku adalah...", a: ["Rp3.000", "Rp4.000", "Rp5.000", "Rp6.000", "Rp2.000"], r: 2 },
        { q: "Dari 40 siswa, 25 suka Matematika, 20 suka Fisika, dan 10 suka keduanya. Banyak siswa yang tidak suka keduanya adalah...", a: ["5", "10", "15", "20", "25"], r: 0 },
        { q: "Dalam sebuah gedung bioskop terdapat 15 baris kursi. Baris terdepan ada 20 kursi, baris kedua 24 kursi, dan seterusnya. Jumlah seluruh kursi adalah...", a: ["600", "720", "840", "960", "1020"], r: 1 },
        { q: "Nilai maksimum fungsi f(x,y) = 2x + 3y pada daerah x+y ≤ 5, x ≥ 0, y ≥ 0 adalah...", a: ["10", "12", "15", "18", "20"], r: 2 },
        { q: "Median dari data: 2, 4, 3, 6, 7, 5, 8, 10 adalah...", a: ["5", "5.5", "6", "6.5", "7"], r: 1 }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let timeLeft = 600; 
    let userName = "";
    let timerInterval;

    function startQuiz() {
        userName = document.getElementById('user-name').value;
        if(!userName) return alert("Wajib mengisi nama ya!");
        document.getElementById('screen-welcome').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('header-name').innerText = userName;
        renderQuestion();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        const card = document.getElementById('q-card');
        card.classList.remove('fade-in');
        void card.offsetWidth; // Reset animation
        card.classList.add('fade-in');

        document.getElementById('q-num-label').innerText = `Soal ${currentIdx + 1 < 10 ? '0' : ''}${currentIdx + 1}`;
        document.getElementById('q-text').innerText = q.q;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";
        q.a.forEach((opt, i) => {
            const isSelected = userAnswers[currentIdx] === i;
            optionsDiv.innerHTML += `
                <button onclick="selectOption(${i})" class="w-full text-left p-5 md:p-6 rounded-[1.5rem] border-2 transition-all flex items-center gap-5 ${isSelected ? 'border-blue-600 bg-blue-50/50 shadow-inner' : 'border-slate-50 hover:border-slate-200 bg-white'}">
                    <span class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-xl font-black text-sm ${isSelected ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}">${String.fromCharCode(65+i)}</span>
                    <span class="font-bold ${isSelected ? 'text-blue-900' : 'text-slate-600'}">${opt}</span>
                </button>
            `;
        });
        document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
        renderGrid();
    }

    function selectOption(i) { userAnswers[currentIdx] = i; renderQuestion(); }
    function nextQ() { if(currentIdx < questions.length-1) { currentIdx++; renderQuestion(); } else { confirmFinish(); } }
    function prevQ() { if(currentIdx > 0) { currentIdx--; renderQuestion(); } }
    function goToQ(i) { currentIdx = i; renderQuestion(); }

    function renderGrid() {
        const grid = document.getElementById('q-grid');
        grid.innerHTML = "";
        questions.forEach((_, i) => {
            const isAnswered = userAnswers[i] !== null;
            const isCurrent = i === currentIdx;
            grid.innerHTML += `
                <button onclick="goToQ(${i})" class="h-12 rounded-2xl font-black text-xs transition-all ${isCurrent ? 'ring-4 ring-blue-100 border-2 border-blue-600 bg-blue-600 text-white' : isAnswered ? 'bg-slate-800 text-white' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}">
                    ${i + 1}
                </button>
            `;
        });
    }

    function updateTimer() {
        timeLeft--;
        let m = Math.floor(timeLeft/60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if(timeLeft <= 0) finishQuiz();
    }

    function confirmFinish() { if(confirm("Kumpulkan sekarang? Kamu tidak bisa mengulang waktu.")) finishQuiz(); }

    function finishQuiz() {
        clearInterval(timerInterval);
        let correct = 0;
        userAnswers.forEach((ans, i) => { if(ans === questions[i].r) correct++; });
        
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('screen-result').style.display = 'flex';
        document.getElementById('res-user-name').innerText = userName;
        document.getElementById('res-score').innerText = correct * 5;
        document.getElementById('res-correct').innerText = correct;
    }

    function toggleReview() {
        const overlay = document.getElementById('review-overlay');
        if(overlay.style.display === 'block') {
            overlay.style.display = 'none';
        } else {
            overlay.style.display = 'block';
            const container = document.getElementById('review-content');
            container.innerHTML = questions.map((q, i) => `
                <div class="p-8 md:p-10 rounded-[2.5rem] border-2 ${userAnswers[i] === q.r ? 'border-green-100 bg-green-50/30' : 'border-red-100 bg-red-50/30'}">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${userAnswers[i] === q.r ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            No. ${i+1} — ${userAnswers[i] === q.r ? 'Benar' : 'Salah'}
                        </span>
                    </div>
                    <h3 class="font-bold text-xl md:text-2xl text-slate-800 leading-relaxed mb-8">${q.q}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="p-5 rounded-2xl bg-white/50 border border-white">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 font-bold">Jawaban Kamu</p>
                            <p class="font-bold ${userAnswers[i] === q.r ? 'text-green-600' : 'text-red-600'}">${userAnswers[i] !== null ? q.a[userAnswers[i]] : '(Tidak dijawab)'}</p>
                        </div>
                        <div class="p-5 rounded-2xl bg-white border border-green-200">
                            <p class="text-[10px] font-black text-green-400 uppercase tracking-widest mb-2 font-bold">Kunci Jawaban</p>
                            <p class="font-bold text-green-700">${q.a[q.r]}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    }

    function downloadPDF() {
        const element = document.createElement('div');
        element.innerHTML = `
            <div style="padding: 50px; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b;">
                <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 10px; color: #2563eb;">Hasil Simulasi UTBK</h1>
                <p style="font-size: 18px; margin-bottom: 30px;">Nama Peserta: <b>${userName}</b></p>
                <div style="display: flex; gap: 20px; margin-bottom: 40px;">
                    <div style="background: #eff6ff; padding: 20px; border-radius: 20px; text-align: center; flex: 1;">
                        <span style="display: block; font-size: 10px; font-weight: 800; color: #3b82f6; text-transform: uppercase;">Skor Akhir</span>
                        <span style="font-size: 40px; font-weight: 900; color: #2563eb;">${document.getElementById('res-score').innerText}</span>
                    </div>
                    <div style="background: #f8fafc; padding: 20px; border-radius: 20px; text-align: center; flex: 1;">
                        <span style="display: block; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Benar</span>
                        <span style="font-size: 40px; font-weight: 900; color: #1e293b;">${document.getElementById('res-correct').innerText}/20</span>
                    </div>
                </div>
                <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">Analisis Soal</h2>
                ${questions.map((q, i) => `
                    <div style="margin-bottom: 25px; padding: 20px; border-radius: 15px; background: ${userAnswers[i] === q.r ? '#f0fdf4' : '#fef2f2'};">
                        <p style="font-size: 14px; margin: 0 0 10px 0;"><b>Soal ${i+1}:</b> ${q.q}</p>
                        <p style="font-size: 12px; margin: 0; color: ${userAnswers[i] === q.r ? '#16a34a' : '#dc2626'}">Status: ${userAnswers[i] === q.r ? 'BENAR' : 'SALAH'}</p>
                        <p style="font-size: 12px; margin: 5px 0 0 0;">Kunci: <b>${q.a[q.r]}</b></p>
                    </div>
                `).join('')}
            </div>
        `;
        const opt = { margin: 0, filename: `UTBK_${userName}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
